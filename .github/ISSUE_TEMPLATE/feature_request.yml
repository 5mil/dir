name: Feature Request
description: Suggest a new capability for dir
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or gap this feature addresses.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see built?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought of?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Mining / Wallet
        - USB ASIC Support
        - Self-hosted deployment
        - Cloud deployment
        - UI / NocoBase plugins
        - Student OS
        - Documentation
        - Other
    validations:
      required: true
