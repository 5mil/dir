version: '3.8'

services:
  app:
    image: nocobase/nocobase:latest
    container_name: dir-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: ${APP_PORT:-13000}
      APP_KEY: ${APP_KEY}
      DB_DIALECT: postgres
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-dir_db}
      DB_USER: ${DB_USER:-dir_user}
      DB_PASSWORD: ${DB_PASSWORD}
      STORAGE_PATH: /app/nocobase/storage
    volumes:
      - app_storage:/app/nocobase/storage
    ports:
      - "127.0.0.1:13000:13000"
    networks:
      - dir-net

  postgres:
    image: postgres:15-alpine
    container_name: dir-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-dir_db}
      POSTGRES_USER: ${DB_USER:-dir_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dir_user} -d ${DB_DATABASE:-dir_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dir-net

  nginx:
    image: nginx:alpine
    container_name: dir-nginx
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - dir-net

volumes:
  app_storage:
  postgres_data:

networks:
  dir-net:
    driver: bridge
