# =============================================================
# dir — Self-Hosted Stack
# Services: NocoBase (app) + PostgreSQL (db) + Redis (cache)
# Usage:
#   docker compose --env-file .env up -d
# =============================================================

version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: dir-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-dir}
      POSTGRES_USER:     ${DB_USER:-dir}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dir} -d ${DB_NAME:-dir}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dir-internal

  redis:
    image: redis:7-alpine
    container_name: dir-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - dir-internal

  app:
    image: nocobase/nocobase:latest
    container_name: dir-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_DIALECT:           postgres
      DB_HOST:              postgres
      DB_PORT:              5432
      DB_DATABASE:          ${DB_NAME:-dir}
      DB_USER:              ${DB_USER:-dir}
      DB_PASSWORD:          ${DB_PASSWORD}
      APP_KEY:              ${JWT_SECRET}
      APP_ENV:              ${APP_ENV:-production}
      APP_PORT:             13000
      ENCRYPTION_FIELD_KEY: ${ENCRYPTION_KEY}
      REDIS_URL:            redis://redis:6379
      LOCAL_STORAGE_DEST:   /app/nocobase/storage
    ports:
      - "127.0.0.1:13000:13000"
    volumes:
      - app_storage:/app/nocobase/storage
      - app_plugins:/app/nocobase/packages
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:13000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - dir-internal
      - dir-external
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  watchtower:
    image: containrrr/watchtower
    container_name: dir-watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_CLEANUP:         "true"
      WATCHTOWER_POLL_INTERVAL:   86400
      WATCHTOWER_MONITOR_ONLY:    ${WATCHTOWER_MONITOR_ONLY:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dir-internal

volumes:
  postgres_data:
  redis_data:
  app_storage:
  app_plugins:

networks:
  dir-internal:
    internal: true
  dir-external:
