# =============================================================
# Nginx reverse proxy for dir
# Place at /etc/nginx/sites-available/dir
# symlink: ln -s /etc/nginx/sites-available/dir /etc/nginx/sites-enabled/
#
# NOTE: SSL/HTTPS to be added via Certbot when ready:
#   sudo certbot --nginx -d your-domain.com --email you@email.com --agree-tos --redirect
# =============================================================

server {
    listen 80;
    server_name YOUR_DOMAIN;

    client_max_body_size 100M;

    # Security headers
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";
    add_header Referrer-Policy        strict-origin-when-cross-origin;

    # WebSocket + HTTP proxy to NocoBase
    location / {
        proxy_pass         http://127.0.0.1:13000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Static file caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2?)$ {
        proxy_pass  http://127.0.0.1:13000;
        expires     7d;
        add_header  Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/dir-access.log;
    error_log  /var/log/nginx/dir-error.log;
}
