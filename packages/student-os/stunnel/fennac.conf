; Fennac FWSMP TLS wrapper — stunnel config
; Phase 5 — Step 46
;
; Network: Fennacminer(4433) → WireBruce(4435) → stunnel → pool.fennac.io:4434

pid    = /var/run/stunnel-fennac.pid
output = /var/log/stunnel-fennac.log

[smp]
client     = yes
accept     = 127.0.0.1:4435
connect    = pool.fennac.io:4434
sslVersion = TLSv1.3
ciphers    = TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
verify     = 0
cert       = /etc/stunnel/certs/client.pem
key        = /etc/stunnel/certs/client.key
